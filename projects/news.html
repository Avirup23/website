<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal — News Intelligence</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='80'>📡</text></svg>">
  <link rel="stylesheet" href="../css/news.css">
</head>
<body>

  <!-- Ticker -->
  <div class="ticker">
    <span class="ticker-inner" id="ticker">Loading headlines…</span>
  </div>

  <!-- Masthead -->
  <header class="masthead">
    <div class="masthead-top">
      <div class="masthead-title">SIG<span>NAL</span></div>
      <div class="masthead-meta" id="masthead-meta">
        Loading…
      </div>
    </div>
    <nav class="masthead-nav" id="nav">
      <!-- tabs injected by JS -->
    </nav>
  </header>

  <!-- Main -->
  <main class="main">
    <div id="loading" class="state-msg">Fetching signals…</div>
    <div id="news-view"></div>
    <div id="tg-view" style="display:none;"></div>
  </main>

  <script src="../javascript/news.js"></script>
  <script>
    // Update masthead meta after load
    window.addEventListener('load', () => {
      const el = document.getElementById('masthead-meta');
      const now = new Date();
      el.innerHTML = `${now.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'})}<br>Last updated ${now.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'})}`;
    });
  </script>

</body>
</html>
