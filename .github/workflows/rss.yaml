name: Update News Feed

permissions:
  contents: write

on:
  schedule:
    - cron: "0 1 * * *"   # 6:30 AM IST
    - cron: "0 13 * * *"  # 6:30 PM IST
  workflow_dispatch:

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install feedparser telethon langchain-groq langchain-core

      - run: python python/news.py
        env:
          TELEGRAM_API_ID:   ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION:  ${{ secrets.TELEGRAM_SESSION }}
          GROQ_API_KEY:      ${{ secrets.LLM_API_KEY }}

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add python/news.json python/podcast_script.txt
          git diff --cached --quiet || git commit -m "Auto update news"
          git push